        <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 mb-4">
          <div className="flex items-center gap-2 mb-3 text-slate-700 font-semibold"><MessageSquarePlus size={18} /><h2>自定義需求 (Custom Requirements)</h2></div>
          <textarea className="w-full h-24 rounded-lg border-slate-300 border p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none bg-white placeholder-slate-400" placeholder="請輸入任何額外的特殊要求，例如：希望語氣更幽默、加入時事梗..." value={state.customRequirements || ''} onChange={(e) => onChange({ customRequirements: e.target.value })} />
        </div>
      );

      const renderAdvancedSection = () => (
        <div className="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
          <button className="w-full p-4 flex items-center justify-between text-slate-600 hover:bg-slate-100 transition-colors" onClick={() => setShowAdvanced(!showAdvanced)}>
            <span className="font-semibold flex items-center gap-2"><Settings size={16} /> 進階設定 (課綱對應 & 差異化)</span>
            {showAdvanced ? <ChevronUp size={16} /> : <ChevronDown size={16} />}
          </button>
          {showAdvanced && (
            <div className="p-5 border-t border-slate-200 bg-white">
               <div className="mb-4">
                 <label className="block text-base font-bold text-slate-800 mb-4">108 課綱能力指標 (自然領綱)</label>
                 <div className="space-y-6">
                    {CURRICULUM_INDICATOR_GROUPS.map((group) => (
                      <div key={group.label} className="border border-slate-100 rounded-lg p-3 bg-slate-50/50">
                        <h4 className="font-semibold text-slate-700 mb-3 border-b border-slate-200 pb-2 flex items-center gap-2 text-sm">{group.label}</h4>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                          {group.options.map(item => (
                            <label key={item.id} className={`flex items-start gap-3 p-3 rounded-lg border transition-all cursor-pointer relative overflow-hidden group ${state.curriculumIndicators.includes(item.id) ? 'bg-blue-50 border-blue-200 shadow-sm' : 'bg-white border-slate-200 hover:border-blue-300 hover:shadow-sm'}`}>
                              <div className="pt-0.5">
                                <input type="checkbox" className="w-4 h-4 accent-blue-600 rounded cursor-pointer" checked={state.curriculumIndicators.includes(item.id)} onChange={(e) => {
                                    const newSet = e.target.checked ? [...state.curriculumIndicators, item.id] : state.curriculumIndicators.filter(i => i !== item.id);
                                    onChange({ curriculumIndicators: newSet });
                                  }} />
                              </div>
                              <div className="flex-1">
                                <div className="font-bold text-sm text-slate-800 mb-0.5">{item.id}</div>
                                <div className="text-xs text-slate-500 leading-relaxed">{item.desc}</div>
                              </div>
                            </label>
                          ))}
                        </div>
                      </div>
                    ))}
                 </div>
               </div>
            </div>
          )}
        </div>
      );

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
          {renderBasicSection()}
          {type === ModuleType.LESSON_PLAN && renderLessonPlanCore()}
          {type === ModuleType.QUESTION && renderQuestionCore()}
          {type === ModuleType.SLIDES && renderSlidesCore()}
          {type === ModuleType.MATERIALS && renderMaterialsCore()}
          {type === ModuleType.INFOGRAPHIC && renderInfographicCore()}
          {renderCustomRequirements()}
          {renderAdvancedSection()}
          <div className="mt-8 flex justify-end">
            <div className="relative group">
              <button onClick={onGenerate} disabled={!isFormValid || isGenerating} className={`flex items-center gap-2 px-8 py-3 rounded-xl font-bold text-lg shadow-lg transition-all ${!isFormValid ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:shadow-blue-500/30 hover:scale-[1.02] active:scale-95'}`}>
                 {isGenerating ? (<><div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" /> 處理中...</>) : (<><Wand2 size={20} /> 生成提示詞 (Generate Prompt)</>)}
              </button>
              {!isFormValid && (
                 <div className="absolute bottom-full right-0 mb-2 w-max px-3 py-1 bg-slate-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity">
                   請填寫必填欄位 (冊次、章節)
                 </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // --- 6. 主程式 App ---
    function App() {
      const [activeTab, setActiveTab] = useState(ModuleType.LESSON_PLAN);
      const [formData, setFormData] = useState(INITIAL_STATE);
      const [result, setResult] = useState("");
      const [isGenerating, setIsGenerating] = useState(false);
      const [copyStatus, setCopyStatus] = useState('idle');

      const handleUpdateState = (updates) => { setFormData(prev => ({ ...prev, ...updates })); };

      // 完全同步 App.tsx 裡的 Prompt 組裝邏輯
      const constructPrompt = () => {
        let prompt = `【角色設定】\n你是一位擁有 10 年以上教學經驗的台灣高中生物教師。請根據我上傳的來源資料（課本或講義），針對「${formData.chapter || "指定單元"}」，協助我生成教學內容。\n\n`;

        if (activeTab === ModuleType.LESSON_PLAN) {
          const displayedMethod = formData.method === '自訂教學法' ? formData.customMethod : formData.method;
          const displayedTheme = formData.lessonPlanTheme === '自訂' ? formData.customLessonPlanTheme : formData.lessonPlanTheme;

          prompt += `【任務：撰寫教案】\n請根據來源資料，設計一份適合「${formData.studentLevel}」的教案。\n\n**教案參數**：\n- 對象：${formData.grade}\n- 時間：${formData.duration}\n- 教學法：${displayedMethod}\n`;
          if (displayedTheme) prompt += `- 主題：${displayedTheme}\n`;
          if (formData.curriculumIndicators.length > 0) prompt += `- 課綱指標：${formData.curriculumIndicators.join(', ')}\n`;
          
          prompt += `\n**輸出要求**：\n1. 結構須包含：教學目標、核心素養、詳細流程（引起動機→發展活動→綜合活動）、評量方式。\n2. 請特別註明在「發展活動」中，如何具體運用「${displayedMethod}」來引導學生。\n`;

        } else if (activeTab === ModuleType.QUESTION) {
          const qTypes = formData.questionType;
          const totalCount = qTypes.reduce((acc, type) => acc + (formData.questionConfig[type]?.count || 0), 0);
          
          prompt += `【任務：設計混合試題】\n請根據來源資料，出一份總共約 ${totalCount} 題的測驗卷。\n\n**題型規格**：\n`;
          qTypes.forEach((type) => {
            const config = formData.questionConfig[type] || { count: 3, difficulty: formData.difficulty };
            prompt += `- ${type}：${config.count} 題 (難度：${config.difficulty})\n`;
          });
          
          prompt += `\n**輸出要求**：\n1. **素養導向**：題目須結合生活情境或科學探究情境，避免純記憶性問答。\n2. **完整解析**：請針對「${formData.explanationType}」的需求，提供正確答案與解析。\n3. **格式**：請依題型分類，並以 Markdown 格式輸出。\n`;

        } else if (activeTab === ModuleType.SLIDES) {
          const structure = formData.slideStructure === "自訂結構" && formData.customSlideStructure ? formData.customSlideStructure : formData.slideStructure;

          prompt += `【任務：製作簡報草稿】\n請根據來源資料中「${formData.chapter}」的內容，為「${formData.studentLevel}」的學生規劃一份簡報大綱。\n\n**簡報規格**：\n- 總頁數：約 ${formData.slideCount} 頁\n- 結構邏輯：${structure}\n- 內容風格：${formData.slideStyle} (請依此風格設定標題語氣與內容取捨)\n- 視覺密度：${formData.visualDensity}\n`;
          prompt += `\n**輸出格式 (請依序條列每一頁)**：\n**Page [頁碼]：[標題]**\n- **核心觀念**：請列出 3-5 點關鍵內容 (Bullet points)，文字須精簡。\n- **講師備忘稿**：說明此頁應講解的觀念細節或舉例。\n- **配圖建議**：描述適合放在此頁的圖表類型或圖片內容 (例如：細胞構造圖、流程圖)。\n`;

        } else if (activeTab === ModuleType.INFOGRAPHIC) {
          prompt += `【任務：設計資訊圖表 (Infographic)】\n請根據來源資料，將「${formData.chapter}」中的關鍵概念轉化為一張資訊圖表的設計企劃案。\n\n**設計參數**：\n- 視覺風格：${formData.infographicStyle || "專業清晰"}\n`;
          
          if (formData.infographicLayout) {
             const opt = INFOGRAPHIC_LAYOUT_OPTIONS.find(o => o.value === formData.infographicLayout);
             if (opt) prompt += `- 結構佈局：${opt.label} (${opt.keywords})\n`;
          }
          if (formData.infographicDensity) {
             const opt = INFOGRAPHIC_DENSITY_OPTIONS.find(o => o.value === formData.infographicDensity);
             if (opt) prompt += `- 資訊密度：${opt.label}\n`;
          }
          if (formData.infographicHierarchy) {
             const opt = INFOGRAPHIC_HIERARCHY_OPTIONS.find(o => o.value === formData.infographicHierarchy);
             if (opt) prompt += `- 視覺層次：${opt.label}\n`;
          }
          if (formData.infographicColor) {
             const opt = INFOGRAPHIC_COLOR_OPTIONS.find(o => o.value === formData.infographicColor);
             if (opt) prompt += `- 配色建議：${opt.label}\n`;
          }

          prompt += `\n**輸出內容**：\n1. **圖表標題**：一個吸睛且明確的主標題。\n2. **核心視覺結構**：文字描述圖表的中央圖像或動線安排 (例如：以時間軸呈現演化過程，或是以中心輻射圖呈現細胞功能)。\n3. **關鍵資訊點**：列出圖表上必須標註的 3-5 個關鍵數據、專有名詞或簡短說明文字。\n4. **設計理念**：簡述為何採用此佈局有助於學生理解此單元。\n`;
          
        } else {
          prompt += `【任務：製作補充教材】\n請根據來源資料，製作一份適合高中生的${formData.enableMaterialStyle ? `「${formData.materialStyle}」` : '補充教材'}。\n\n**規格設定**：\n`;
          if (formData.enableMaterialDifficulty) prompt += `- 難度：${formData.materialDifficulty}\n`;
          if (formData.enableMaterialLength) prompt += `- 份量：${formData.materialLength}\n`;
          if (formData.enableMaterialSource && formData.materialSource.length > 0) prompt += `- 參考重點：${formData.materialSource.join('、')}\n`;

          prompt += `\n**內容要求**：\n`;
          if (formData.enableKeywords) prompt += `1. **關鍵名詞**：請依「${formData.keywordsFormat}」格式解釋重要名詞${formData.customKeywords ? ` (包含：${formData.customKeywords})` : ''}。\n`;
          if (formData.enableTables) prompt += `2. **表格整理**：請製作一個「${formData.tablesFormat}」來比較易混淆觀念。\n`;
          if (formData.enableExamples) prompt += `3. **例題講解**：提供 3 題「${formData.examplesFormat}」。\n`;
          if (formData.enablePractice) prompt += `4. **課後練習**：提供 3 題「${formData.practiceFormat}」。\n`;
        }

        if (formData.customRequirements && formData.customRequirements.trim() !== '') {
            prompt += `\n**特殊需求**：\n${formData.customRequirements}\n`;
        }
        return prompt;
      };

      const handleGenerate = () => {
        setIsGenerating(true);
        setCopyStatus('idle');
        setTimeout(() => {
            const userPrompt = constructPrompt();
            setResult(userPrompt);
            setIsGenerating(false);
            setTimeout(() => { document.getElementById('result-area')?.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
        }, 500); // 模擬 App.tsx 中的 500ms 體驗延遲
      };

      const handleCopy = async () => {
        if (!result) return;
        try {
          if (navigator.clipboard && window.isSecureContext) {
              await navigator.clipboard.writeText(result);
          } else {
              let textArea = document.createElement("textarea");
              textArea.value = result;
              textArea.style.position = "fixed";
              textArea.style.left = "-999999px";
              document.body.appendChild(textArea);
              textArea.focus();
              textArea.select();
              document.execCommand('copy');
              textArea.remove();
          }
          setCopyStatus('copied');
          setTimeout(() => setCopyStatus('idle'), 2000);
        } catch (err) {
          console.error("Failed to copy text: ", err);
          alert("複製失敗，請手動全選複製。");
        }
      };

      return (
        <div className="min-h-screen pb-12 font-sans text-slate-800">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-3">
                 <div className="w-9 h-9 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white font-bold shadow-md">Bio</div>
                 <h1 className="text-xl font-bold text-slate-800 tracking-wide">高中生物提示詞生成平台</h1>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full hidden sm:block">
                Ver 2.9 (NotebookLM Optimized HTML)
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-8">
            <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-7 text-white mb-8 shadow-lg relative overflow-hidden">
              <div className="absolute top-0 right-0 -mt-10 -mr-10 opacity-10"><Boxes size={200} /></div>
              <div className="relative z-10">
                <h2 className="text-2xl font-bold mb-3 flex items-center gap-2"><Check size={28}/> AI 結構化提示詞生成助手</h2>
                <p className="opacity-90 max-w-2xl leading-relaxed text-sm">
                  此平台專為生成高品質的「結構化 Prompt」設計。我們將您的教學需求轉化為 AI 能夠精準理解的專業指令。
                  一鍵生成後，請複製貼上至 <strong>NotebookLM</strong> (推薦) 或 Google Gemini，即可獲得最精準的教學內容。
                </p>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
              <div className="lg:col-span-8 space-y-6">
                <div className="flex space-x-1 overflow-x-auto pb-2 border-b-2 border-slate-200 custom-scrollbar">
                  {TAB_CONFIG.map(tab => {
                    const Icon = tab.icon;
                    const isActive = activeTab === tab.id;
                    return (
                      <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-5 py-3.5 text-sm font-semibold rounded-t-xl transition-all whitespace-nowrap transform ${isActive ? 'bg-white border-b-2 border-blue-500 text-blue-600 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] translate-y-[2px]' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100'}`}>
                        <Icon size={18} className={isActive ? tab.color : ''} />{tab.label}
                      </button>
                    );
                  })}
                </div>

                <GeneratorForm type={activeTab} state={formData} onChange={handleUpdateState} onGenerate={handleGenerate} isGenerating={isGenerating} />

                {result && (
                  <div id="result-area" className="space-y-4 animate-fade-in pt-4">
                     <div className="bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-xl relative overflow-hidden group">
                        <div className="absolute top-0 right-0 p-4 bg-gradient-to-l from-slate-800 to-transparent w-full h-16 pointer-events-none"></div>
                        <div className="flex items-center justify-between mb-4 border-b border-slate-700 pb-4 relative z-10">
                          <h3 className="text-lg font-bold text-slate-100 flex items-center gap-2">
                            <span className="w-2.5 h-2.5 bg-green-400 rounded-full animate-pulse shadow-[0_0_8px_rgba(74,222,128,0.8)]"></span>
                            已優化的結構化提示詞 (Structured Prompt)
                          </h3>
                          <button onClick={handleCopy} className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${copyStatus === 'copied' ? 'bg-green-500 text-white shadow-md' : 'bg-slate-700 text-slate-300 hover:bg-slate-600 hover:text-white shadow-md'}`}>
                            {copyStatus === 'copied' ? <><Check size={16} /> 已複製！</> : <><Copy size={16} /> 複製提示詞</>}
                          </button>
                        </div>
                        <div className="font-mono text-sm md:text-base leading-relaxed text-slate-300 whitespace-pre-wrap break-words max-h-[500px] overflow-y-auto pr-2 custom-scrollbar select-all">
                          {result}
                        </div>
                        <div className="mt-4 pt-4 border-t border-slate-700 flex flex-col sm:flex-row items-start sm:items-center justify-between text-sm text-slate-400 gap-3">
                          <span className="flex items-center gap-2"><Info size={16}/> 下一步：點擊右上角複製，並貼入 NotebookLM 對話框</span>
                          <a href="https://notebooklm.google.com/" target="_blank" rel="noreferrer" className="flex items-center gap-1 text-blue-400 hover:text-blue-300 transition-colors font-medium bg-blue-500/10 px-3 py-1.5 rounded-full">
                            前往 NotebookLM <ExternalLink size={14} />
                          </a>
                        </div>
                     </div>
                  </div>
                )}
              </div>

              <div className="lg:col-span-4">
                 <div className="space-y-6 lg:space-y-0 lg:sticky lg:top-24 lg:h-[calc(100vh-8rem)] lg:flex lg:flex-col gap-6">
                  <div className="lg:flex-none">
                     <PreviewPanel state={formData} />
                  </div>
                  <div className="lg:flex-1 lg:overflow-y-auto lg:pr-1 lg:custom-scrollbar lg:pb-4">
                    <div className="bg-blue-50 border border-blue-100 rounded-xl p-5 shadow-sm">
                      <h4 className="font-bold text-blue-800 mb-2 flex items-center gap-2">🚀 高效使用指南</h4>
                      <ol className="text-sm text-blue-800/80 list-decimal pl-4 space-y-3">
                        <li><strong>參數設定</strong>：在左側選單選擇冊次與章節，這會決定 AI 的知識範圍。</li>
                        <li><strong>混合題組</strong>：現在支援<strong>複選題型</strong>，並可針對每個題型單獨設定「題數」與「難度」，AI 將為您生成完美的混合試卷。</li>
                        <li><strong>生成提示詞</strong>：系統會自動將您的選項轉化為「角色設定」與「深度指令」。</li>
                        <li><strong>複製並執行</strong>：
                          <ul className="list-disc pl-4 mt-1 text-xs opacity-90">
                            <li>推薦貼入 <strong>NotebookLM</strong> 並上傳課本 PDF，以獲得最精準的題目與簡報內容。</li>
                          </ul>
                        </li>
                      </ol>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
