<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 輔助考卷出改解題</title>
<style>
  /* ── DARK THEME (default) ── */
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222636;
    --accent: #4f7fff;
    --accent2: #7c5cfc;
    --text: #e8eaf0;
    --text-dim: #9ca3b8;
    --border: #2e3348;
    --gold: #f5c842;
    --slide-bg: #000;
    --thumb-strip-bg: #0f1117;
  }
  /* ── LIGHT THEME ── */
  body.light {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --surface2: #e8eaf2;
    --accent: #3060dd;
    --accent2: #6040cc;
    --text: #1a1d30;
    --text-dim: #5a6080;
    --border: #d0d4e8;
    --gold: #b8860b;
    --slide-bg: #e0e2ec;
    --thumb-strip-bg: #e8eaf2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-title {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: .04em;
    background: linear-gradient(135deg, #5b8fff, #a56bff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }
  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ctrl-label { font-size: .8rem; color: var(--text-dim); white-space: nowrap; }
  .ctrl-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: .85rem;
    cursor: pointer;
  }
  .btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: none;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn:hover { opacity: .85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-play {
    background: linear-gradient(135deg, #4f7fff, #7c5cfc);
    color: #fff;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-fs {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 5px;
  }
  .btn-fs.active {
    background: linear-gradient(135deg, #2a5ccc, #5a3db0);
    border-color: transparent;
    color: #fff;
  }

  /* ── MAIN ── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SLIDE PANEL (left 2/3) ── */
  .slide-panel {
    flex: 0 0 66.666%;
    display: flex;
    flex-direction: column;
    background: var(--slide-bg);
    position: relative;
    overflow: hidden;
  }
  .slide-img-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    overflow: hidden;
  }
  .slide-img-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
    transition: opacity .35s ease;
    display: block;
  }
  .slide-img-wrap img.fading { opacity: 0; }

  /* ── TEXT PANEL (right 1/3) ── */
  .text-panel {
    flex: 0 0 33.333%;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow: hidden;
  }
  .text-header {
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .slide-badge {
    display: inline-block;
    background: linear-gradient(135deg, #4f7fff33, #7c5cfc33);
    border: 1px solid #4f7fff55;
    color: var(--accent);
    font-size: .78rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: .06em;
    margin-bottom: 6px;
  }
  .slide-title-text {
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
  }
  .text-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .text-body p {
    font-size: 1.3rem;
    line-height: 2.05;
    color: var(--text);
    margin-bottom: 20px;
  }
  .text-body p:last-child { margin-bottom: 0; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .1s;
  }
  .nav-btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
  .nav-btn:active:not(:disabled) { transform: scale(.95); }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
  .page-indicator {
    font-size: .9rem;
    color: var(--text-dim);
    min-width: 80px;
    text-align: center;
    font-weight: 600;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    max-width: 200px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #4f7fff, #7c5cfc);
    border-radius: 2px;
    transition: width .3s ease;
  }

  /* ── THUMBNAIL STRIP ── */
  .thumb-strip {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    max-height: 110px;
    padding: 10px 16px;
  }
  .thumb {
    flex-shrink: 0;
    width: 116px;
    height: 82px;
    border-radius: 5px;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid transparent;
    opacity: .55;
    transition: opacity .15s, border-color .15s, transform .15s;
  }
  .thumb:hover { opacity: .85; transform: scaleY(1.04); }
  .thumb.active { border-color: var(--accent); opacity: 1; }

  /* ── AUTHOR INFO (in header) ── */
  .header-author {
    font-size: .82rem;
    color: var(--text-dim);
    letter-spacing: .04em;
    white-space: nowrap;
    border-left: 1px solid var(--border);
    padding-left: 14px;
    margin-left: 4px;
  }
  .header-author strong { color: var(--gold); font-weight: 700; }

  /* ── FULLSCREEN OVERLAY ── */
  #fs-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #fs-overlay.active { display: flex; }
  #fs-img {
    max-width: 100vw;
    max-height: calc(100vh - 80px);
    object-fit: contain;
    transition: opacity .35s ease;
    display: block;
  }
  #fs-img.fading { opacity: 0; }
  .fs-controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 12px 24px;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(8px);
    transition: opacity .3s;
  }
  .fs-controls.hidden { opacity: 0; pointer-events: none; }
  .fs-nav-btn {
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    width: 40px; height: 40px;
    border-radius: 8px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .fs-nav-btn:hover:not(:disabled) { background: rgba(255,255,255,.25); }
  .fs-nav-btn:disabled { opacity: .25; cursor: not-allowed; }
  .fs-page { color: rgba(255,255,255,.75); font-size: .9rem; min-width: 70px; text-align: center; }
  .fs-exit-btn {
    position: fixed;
    top: 14px; right: 18px;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: .82rem;
    cursor: pointer;
    z-index: 10001;
    transition: background .15s;
  }
  .fs-exit-btn:hover { background: rgba(255,255,255,.25); }
  .fs-auto-label {
    color: rgba(255,255,255,.6);
    font-size: .8rem;
    white-space: nowrap;
  }
  .fs-ctrl-select {
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: .82rem;
    cursor: pointer;
  }
  .fs-progress {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,.1);
    z-index: 10001;
  }
  .fs-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #4f7fff, #a56bff);
    transition: width .3s ease;
  }
  /* Auto-play timer ring */
  .timer-ring {
    position: relative;
    width: 32px; height: 32px;
    flex-shrink: 0;
  }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle {
    fill: none;
    stroke-width: 3;
  }
  .timer-bg { stroke: rgba(255,255,255,.15); }
  .timer-fill { stroke: #4f7fff; stroke-dasharray: 88; stroke-dashoffset: 88; transition: stroke-dashoffset .1s linear; }

  /* Thumbnail strip bg */
  .thumb-strip { background: var(--thumb-strip-bg); }

  /* Scrollbar style */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── THEME TOGGLE BUTTON ── */
  .btn-theme {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    font-size: .85rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .2s, color .2s, border-color .2s, transform .1s;
    white-space: nowrap;
  }
  .btn-theme:hover { opacity: .85; transform: translateY(-1px); }
  body.light .btn-theme {
    background: #1a1d27;
    color: #e8eaf0;
    border-color: #3a4060;
  }

  /* Auto play indicator */
  .auto-indicator {
    display: inline-block;
    width: 8px; height: 8px;
    background: #4fff8a;
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse-dot 1s infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; }
    50% { opacity: .3; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">🎓 AI 輔助考卷出改解題</div>
  <div class="header-author">臺北市立麗山高中 ｜ <strong>林獻升 老師</strong> 製作</div>
  <div class="header-controls" style="margin-left:auto;">
    <span class="ctrl-label">自動播放：</span>
    <select class="ctrl-select" id="autoSpeedSelect">
      <option value="0">關閉</option>
      <option value="4">4 秒</option>
      <option value="6" selected>6 秒</option>
      <option value="8">8 秒</option>
      <option value="12">12 秒</option>
      <option value="20">20 秒</option>
    </select>
    <button class="btn btn-play" id="playBtn" onclick="togglePlay()">
      <span id="playIcon">▶</span> <span id="playLabel">播放</span>
    </button>
    <button class="btn btn-fs" id="fsBtn" onclick="enterFullscreen()">
      ⛶ 全螢幕
    </button>
    <button class="btn-theme" id="themeBtn" onclick="toggleTheme()" title="切換背景色">
      <span id="themeIcon">☀️</span><span id="themeLabel">白底</span>
    </button>
  </div>
</header>

<!-- MAIN AREA -->
<main>
  <!-- Left: Slide image -->
  <div class="slide-panel">
    <div class="slide-img-wrap">
      <img id="mainImg" src="" alt="Slide">
    </div>
    <!-- Thumbnail strip -->
    <div class="thumb-strip" id="thumbStrip"></div>
  </div>

  <!-- Right: Text panel -->
  <div class="text-panel">
    <div class="text-header">
      <div class="slide-badge" id="slideBadge">SLIDE 01</div>
      <div class="slide-title-text" id="slideTitleText"></div>
    </div>
    <div class="text-body" id="textBody"></div>
  </div>
</main>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="gotoSlide(current-1)" title="上一頁">◀</button>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="page-indicator" id="pageIndicator">1 / 32</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar2"></div>
  </div>
  <button class="nav-btn" id="nextBtn" onclick="gotoSlide(current+1)" title="下一頁">▶</button>
</div>

<!-- FULLSCREEN OVERLAY -->
<div id="fs-overlay">
  <div class="fs-progress"><div class="fs-progress-bar" id="fsProgressBar"></div></div>
  <button class="fs-exit-btn" onclick="exitFullscreen()">✕ 離開全螢幕</button>
  <img id="fs-img" src="" alt="Slide Fullscreen">
  <div class="fs-controls" id="fsControls">
    <button class="fs-nav-btn" id="fsPrevBtn" onclick="gotoSlide(current-1)">◀</button>
    <div class="timer-ring" id="timerRing" title="自動播放進度">
      <svg width="32" height="32" viewBox="0 0 32 32">
        <circle class="timer-bg" cx="16" cy="16" r="14"/>
        <circle class="timer-fill" id="timerCircle" cx="16" cy="16" r="14"/>
      </svg>
    </div>
    <span class="fs-page" id="fsPageIndicator">1 / 32</span>
    <div class="timer-ring" style="visibility:hidden"></div><!-- spacer -->
    <button class="fs-nav-btn" id="fsNextBtn" onclick="gotoSlide(current+1)">▶</button>
    <span class="fs-auto-label" style="margin-left:12px">自動播放：</span>
    <select class="fs-ctrl-select" id="fsAutoSpeedSelect">
      <option value="0">關閉</option>
      <option value="4">4 秒</option>
      <option value="6" selected>6 秒</option>
      <option value="8">8 秒</option>
      <option value="12">12 秒</option>
      <option value="20">20 秒</option>
    </select>
    <button class="fs-nav-btn" id="fsPauseBtn" onclick="togglePlay()" title="播放/暫停" style="font-size:.9rem">▶</button>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━
//  SLIDE DATA
// ━━━━━━━━━━━━━━━━━━━━━━━━━
const slides = [
  {
    title: "AI助教時代的教學評量革命",
    img: "origin_image/slide_01.png",
    text: `今天這場研習的主軸，藏著一個在教學現場醞釀已久的問題：面對 108 課綱的素養評量浪潮，我們能不能讓 AI 成為真正有用的助教，而不只是一個花俏的科技玩具？

從麗山生物科的教學現場出發，今天把這段走過來的實踐經驗直接分享給大家，希望帶回去就能用。`
  },
  {
    title: "今天研習的四大核心模組",
    img: "origin_image/slide_02.png",
    text: `今天的研習設計了四個模組，彼此之間有內在的邏輯串連。

我們從學理基礎出發，先確立「什麼才算真正意義上的素養評量」；接著進入 AI 出題實務，實際看看多模態材料與實驗情境如何快速轉化成考題；第三個模組聚焦在智慧批改，包括手寫非選題與國寫作文的 AI 評閱流程；最後，我們一起建立 NotebookLM 解題助教，讓這套工作流完整落地在班級現場。`
  },
  {
    title: "108課綱下，教師的「評量深淵」",
    img: "origin_image/slide_03.png",
    text: `108 課綱對情境化命題的要求，是一把雙面刃。它讓評量變得更真實，但也讓出題變得極度耗時——找素材、處理圖表、撰寫長篇情境文，一份段考卷動輒花上整個週末。

更別說手寫題的批改，改到肩膀痠痛，每位學生卻只能得到一個分數，幾乎沒有個別的學習回饋。這就是我們所說的「評量深淵」：好的設計理念，卻因工作量過重而難以真正落實。`
  },
  {
    title: "教師與 AI 協同的四個應用層次",
    img: "origin_image/slide_04.png",
    text: `面對這個困境，我們整理了一張學習地圖，把教師與 AI 協同的應用分成四個層次。

最入門的 Level 1，是把現成的 PDF 講義直接交給 AI 一鍵生出題庫；Level 2 是學會提示詞，能按需改造舊題；Level 3 能融入影片與實驗材料進行多模態命題；Level 4 則是善用視覺辨識與 AI 代理人，實現半自動化出卷。今天我們就一關一關地往上走。`
  },
  {
    title: "素養試題的四大靈魂要素",
    img: "origin_image/slide_05.png",
    text: `素養導向評量的核心，可以用四個要素概括：情境脈絡、整合運用、能力表現，以及態度與價值。這四者並不是各自獨立的條件，而是相互嵌扣的整體。

其中最容易出問題的，是情境的真實性——如果把題目的情境段落遮住，學生仍然能靠公式做出答案，那這個情境就只是裝飾，稱不上真正的素養題，需要從根本重新設計。`
  },
  {
    title: "國中教育會考：三多一沒有",
    img: "origin_image/slide_06.png",
    text: `國中會考在自然科的命題邏輯，可以用「三多一沒有」來掌握：文字多、圖表多、情境多，但沒有複雜的計算。

圖表題在會考自然科佔了七到八成，這個比例很清楚地告訴我們，訓練學生的圖表解讀與變因控制能力，比讓他們背大量細節更為關鍵。我們的命題，也應該往這個方向靠攏。`
  },
  {
    title: "大學學測：學術情境化與混合題型",
    img: "origin_image/slide_07.png",
    text: `學測的挑戰在於閱讀量。自然科和國語文的字數每年都在刷新記錄，學生在有限時間內要消化大量的情境文字，本身就是一項能力的測驗。

更值得關注的是混合題組的出現——選擇題與非選擇手寫題共享同一個情境，層層遞進，讓學生無法只靠猜選項過關，必須真正理解情境脈絡才能作答。`
  },
  {
    title: "分科測驗：鷹架式題組與第一性原理",
    img: "origin_image/slide_08.png",
    text: `分科測驗則是真正在考科學思辨的素養。它常常引入陌生的學術情境——如 GLP-1 減重藥物的作用機制，或是植物工廠的能量轉換——要求學生回歸第一性原理，用最核心的學科概念去分析一個全新的狀況。

非選題配分大幅增加，答題不是填幾個關鍵字，而是要寫出一條清晰的因果推論鏈。`

// ━━━━━━━━━━━━━━━━━━━━━━━━━
//  STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━
let current = 0;
let isPlaying = false;
let autoTimer = null;
let autoProgress = null;
let timerElapsed = 0;
let isFS = false;
let fsHideTimer = null;

const TOTAL = slides.length;

// ━━━━━━━━━━━━━━━━━━━━━━━━━
//  ELEMENTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━
const mainImg = document.getElementById('mainImg');
const fsImg = document.getElementById('fs-img');
const textBody = document.getElementById('textBody');
const slideBadge = document.getElementById('slideBadge');
const slideTitleText = document.getElementById('slideTitleText');
const pageIndicator = document.getElementById('pageIndicator');
const fsPageIndicator = document.getElementById('fsPageIndicator');
const progressBar = document.getElementById('progressBar');
const progressBar2 = document.getElementById('progressBar2');
const fsProgressBar = document.getElementById('fsProgressBar');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const fsPrevBtn = document.getElementById('fsPrevBtn');
const fsNextBtn = document.getElementById('fsNextBtn');
const fsPauseBtn = document.getElementById('fsPauseBtn');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const playLabel = document.getElementById('playLabel');
const fsBtn = document.getElementById('fsBtn');
const fsOverlay = document.getElementById('fs-overlay');
const fsControls = document.getElementById('fsControls');
const thumbStrip = document.getElementById('thumbStrip');
const autoSpeedSelect = document.getElementById('autoSpeedSelect');
const fsAutoSpeedSelect = document.getElementById('fsAutoSpeedSelect');
const timerCircle = document.getElementById('timerCircle');

// ━━━━━━━━━━━━━━━━━━━━━━━━━
//  THUMBNAILS
// ━━━━━━━━━━━━━━━━━━━━━━━━━
function buildThumbs() {
  slides.forEach((s, i) => {
    const img = document.createElement('img');
    img.src = s.img;
    img.className = 'thumb' + (i === 0 ? ' active' : '');
    img.title = `第 ${i+1} 頁：${s.title}`;
    img.onclick = () => gotoSlide(i);
    thumbStrip.appendChild(img);
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━
//  NAVIGATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━
function gotoSlide(n, skipResetTimer) {
  if (n < 0 || n >= TOTAL) return;

  // Fade transition
  mainImg.classList.add('fading');
  fsImg.classList.add('fading');

  setTimeout(() => {
    current = n;
    const s = slides[current];

    mainImg.src = s.img;
    mainImg.classList.remove('fading');

    fsImg.src = s.img;
    fsImg.classList.remove('fading');

    // Text panel
    slideBadge.textContent = `SLIDE ${String(current+1).padStart(2,'0')}`;
    slideTitleText.textContent = s.title;
    // Render paragraphs
    textBody.innerHTML = s.text.trim().split(/\n\n+/).map(p =>
      `<p>${p.trim().replace(/\n/g,'<br>')}</p>`
    ).join('');

    // Indicators
    const pct = ((current+1)/TOTAL*100).toFixed(1) + '%';
    progressBar.style.width = pct;
    progressBar2.style.width = pct;
    fsProgressBar.style.width = pct;
    pageIndicator.textContent = `${current+1} / ${TOTAL}`;
    fsPageIndicator.textContent = `${current+1} / ${TOTAL}`;

    // Buttons
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === TOTAL-1;
    fsPrevBtn.disabled = current === 0;
    fsNextBtn.disabled = current === TOTAL-1;

    // Thumbnail
    document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i===current));
    // Scroll thumb into view
    const activThumb = thumbStrip.children[current];
    if (activThumb) activThumb.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});

    // If playing, reset timer
    if (isPlaying && !skipResetTimer) resetAutoTimer();

    // If at end and playing, stop
    if (current === TOTAL-1 && isPlaying) {
      // let it stay on last slide
    }
  }, 160);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━
//  AUTO PLAY
// ━━━━━━━━━━━━━━━━━━━━━━━━━
function getSpeed() {
  // Use whichever select is active
  const v = isFS ? parseInt(fsAutoSpeedSelect.value) : parseInt(autoSpeedSelect.value);
  return isNaN(v) ? 0 : v;
}

function syncSpeeds() {
  // Keep both selects in sync
  autoSpeedSelect.value = fsAutoSpeedSelect.value;
  fsAutoSpeedSelect.value = autoSpeedSelect.value;
}

autoSpeedSelect.addEventListener('change', () => {
  fsAutoSpeedSelect.value = autoSpeedSelect.value;
  if (isPlaying) resetAutoTimer();
});
fsAutoSpeedSelect.addEventListener('change', () => {
  autoSpeedSelect.value = fsAutoSpeedSelect.value;
  if (isPlaying) resetAutoTimer();
});

function startAutoPlay() {
  const speed = getSpeed();
  if (speed === 0) { stopAutoPlay(); return; }
  isPlaying = true;
  updatePlayUI();
  resetAutoTimer();
}

function stopAutoPlay() {
  isPlaying = false;
  clearInterval(autoTimer);
  clearInterval(autoProgress);
  timerElapsed = 0;
  timerCircle.style.strokeDashoffset = '88';
  updatePlayUI();
}

function resetAutoTimer() {
  clearInterval(autoTimer);
  clearInterval(autoProgress);
  timerElapsed = 0;

  const speed = getSpeed();
  if (speed === 0) { stopAutoPlay(); return; }

  const circumference = 88;
  timerCircle.style.strokeDashoffset = String(circumference);

  // Progress ring update every 100ms
  autoProgress = setInterval(() => {
    timerElapsed += 0.1;
    const fraction = timerElapsed / speed;
    const offset = circumference * (1 - fraction);
    timerCircle.style.strokeDashoffset = String(Math.max(0, offset));
  }, 100);

  autoTimer = setInterval(() => {
    if (current < TOTAL-1) {
      gotoSlide(current+1, true);
      timerElapsed = 0;
      clearInterval(autoProgress);
      const progressRefresh = setInterval(() => {
        timerElapsed += 0.1;
        const fraction = timerElapsed / speed;
        const offset = circumference * (1 - fraction);
        timerCircle.style.strokeDashoffset = String(Math.max(0, offset));
        if (timerElapsed >= speed) clearInterval(progressRefresh);
      }, 100);
      autoProgress = progressRefresh;
    } else {
      // Loop back or stop
      stopAutoPlay();
    }
  }, speed * 1000);
}

function togglePlay() {
  if (isPlaying) {
    stopAutoPlay();
  } else {
    const speed = getSpeed();
    if (speed === 0) {
      // Default to 6s if "off"
      autoSpeedSelect.value = '6';
      fsAutoSpeedSelect.value = '6';
    }
    startAutoPlay();
  }
}

function updatePlayUI() {
  if (isPlaying) {
    playIcon.textContent = '⏸';
    playLabel.textContent = '暫停';
    fsPauseBtn.textContent = '⏸';
    playBtn.innerHTML = '<span class="auto-indicator"></span><span>暫停</span>';
  } else {
    playIcon.textContent = '▶';
    playLabel.textContent = '播放';
    fsPauseBtn.textContent = '▶';
    playBtn.innerHTML = '▶ 播放';
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━
//  FULLSCREEN
// ━━━━━━━━━━━━━━━━━━━━━━━━━
function enterFullscreen() {
  isFS = true;
  fsOverlay.classList.add('active');
  fsBtn.classList.add('active');
  fsBtn.textContent = '⛶ 返回';
  gotoSlide(current, true);
  // Also request browser fullscreen
  if (fsOverlay.requestFullscreen) fsOverlay.requestFullscreen().catch(()=>{});
  setupFsMouseHide();
}

function exitFullscreen() {
  isFS = false;
  fsOverlay.classList.remove('active');
  fsBtn.classList.remove('active');
  fsBtn.textContent = '⛶ 全螢幕';
  fsControls.classList.remove('hidden');
  clearTimeout(fsHideTimer);
  if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
}

function setupFsMouseHide() {
  const overlay = document.getElementById('fs-overlay');
  overlay.addEventListener('mousemove', showFsControls);
}

function showFsControls() {
  fsControls.classList.remove('hidden');
  clearTimeout(fsHideTimer);
  fsHideTimer = setTimeout(() => {
    fsControls.classList.add('hidden');
  }, 3000);
}

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && isFS) exitFullscreen();
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━
//  KEYBOARD
// ━━━━━━━━━━━━━━━━━━━━━━━━━
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault();
    gotoSlide(current+1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    gotoSlide(current-1);
  } else if (e.key === 'Escape' && isFS) {
    exitFullscreen();
  } else if (e.key === 'f' || e.key === 'F') {
    isFS ? exitFullscreen() : enterFullscreen();
  } else if (e.key === 'p' || e.key === 'P') {
    togglePlay();
  }
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━
//  THEME TOGGLE
// ━━━━━━━━━━━━━━━━━━━━━━━━━
let isLight = false;
function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (isLight) {
    icon.textContent = '🌙';
    label.textContent = '黑底';
  } else {
    icon.textContent = '☀️';
    label.textContent = '白底';
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━
//  INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━
buildThumbs();
gotoSlide(0, true);
</script>
